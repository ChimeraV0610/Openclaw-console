<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenClaw Agent Dashboard</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #121a30;
        --panel-2: #19233f;
        --text: #e8ecf8;
        --muted: #93a0c3;
        --green: #22c55e;
        --yellow: #f59e0b;
        --red: #ef4444;
        --blue: #60a5fa;
        --border: rgba(255,255,255,0.08);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Inter, Segoe UI, system-ui, sans-serif;
        background: linear-gradient(180deg, #0b1020 0%, #0f172a 100%);
        color: var(--text);
      }
      .wrap {
        max-width: 1280px;
        margin: 0 auto;
        padding: 24px;
      }
      h1, h2, h3, p { margin: 0; }
      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 16px;
        margin-bottom: 20px;
      }
      .subtitle { color: var(--muted); margin-top: 6px; }
      .btn {
        border: 1px solid var(--border);
        background: var(--panel-2);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
      }
      .grid {
        display: grid;
        gap: 16px;
      }
      .stats {
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        margin-bottom: 16px;
      }
      .card {
        background: rgba(18, 26, 48, 0.92);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 18px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      }
      .stat-value {
        font-size: 30px;
        font-weight: 700;
        margin-top: 8px;
      }
      .muted { color: var(--muted); }
      .main {
        display: grid;
        grid-template-columns: 1.4fr 1fr;
        gap: 16px;
      }
      .agent-list, .task-list {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }
      .agent, .task {
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255,255,255,0.03);
      }
      .row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }
      .chips {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        margin-top: 10px;
      }
      .chip {
        font-size: 12px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(255,255,255,0.08);
        color: var(--text);
      }
      .chip.green { background: rgba(34,197,94,0.18); color: #9ff0ba; }
      .chip.yellow { background: rgba(245,158,11,0.16); color: #ffd58a; }
      .chip.red { background: rgba(239,68,68,0.18); color: #ffadad; }
      .chip.blue { background: rgba(96,165,250,0.16); color: #b8d7ff; }
      .section-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
      }
      .form {
        display: grid;
        gap: 10px;
        margin-top: 14px;
      }
      input, textarea, select {
        width: 100%;
        background: #0d152b;
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 10px;
        padding: 10px 12px;
      }
      textarea { min-height: 88px; resize: vertical; }
      .small { font-size: 12px; }
      .danger-box {
        margin-top: 16px;
        border: 1px solid rgba(239,68,68,0.3);
        background: rgba(239,68,68,0.08);
        border-radius: 14px;
        padding: 14px;
      }
      @media (max-width: 960px) {
        .main { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="topbar">
        <div>
          <h1>OpenClaw 单控制台</h1>
          <p class="subtitle">从多模型混战切回一个清晰可控的 agent dashboard</p>
        </div>
        <button class="btn" id="refreshBtn">刷新</button>
      </div>

      <div class="grid stats">
        <div class="card"><div class="muted">主 Agent</div><div class="stat-value" id="primaryAgent">-</div></div>
        <div class="card"><div class="muted">在线/工作中 Agent</div><div class="stat-value" id="onlineAgents">-</div></div>
        <div class="card"><div class="muted">已完成任务</div><div class="stat-value" id="doneTasks">-</div></div>
        <div class="card"><div class="muted">未完成任务</div><div class="stat-value" id="pendingTasks">-</div></div>
      </div>

      <div class="main">
        <div class="card">
          <div class="section-head">
            <div>
              <h2>Agent 状态</h2>
              <p class="muted small" id="gatewayStatus">载入中…</p>
            </div>
          </div>
          <div class="agent-list" id="agentList"></div>

          <div class="danger-box">
            <strong>当前重构策略</strong>
            <p class="muted small" style="margin-top:8px; line-height:1.5;">
              先把系统收敛成一个主控制器 + 可视化状态面板。这个版本已经直接读取 OpenClaw CLI 数据，后续我可以继续接“停用非主模型 / 配置收口 / 一键重启网关”。
            </p>
          </div>
        </div>

        <div class="card">
          <div class="section-head">
            <div>
              <h2>任务看板</h2>
              <p class="muted small">手工维护任务，和 OpenClaw 状态一起看</p>
            </div>
          </div>

          <form class="form" id="taskForm">
            <input name="title" placeholder="新任务标题" required />
            <input name="owner" placeholder="负责人（默认 gpt）" />
            <select name="status">
              <option value="todo">todo</option>
              <option value="in_progress">in_progress</option>
              <option value="done">done</option>
            </select>
            <textarea name="notes" placeholder="任务备注 / 验收条件"></textarea>
            <button class="btn" type="submit">添加任务</button>
          </form>

          <div class="task-list" id="taskList"></div>
        </div>
      </div>
    </div>

    <script src="/app.js"></script>
  </body>
</html>
